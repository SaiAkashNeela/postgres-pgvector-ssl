version: '3.8'

services:
  managed-postgres:
    image: ghcr.io/saiakashneela/postgres-pgvector-ssl:latest
    container_name: managed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  managed-redis:
    image: redis:latest
    container_name: managed-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --bind 0.0.0.0
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  postgres-backup:
    build:
      context: ./backup
    container_name: postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: managed-postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET}
      S3_PREFIX: ${S3_PREFIX:-postgres-backups}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
    depends_on:
      managed-postgres:
        condition: service_healthy
    networks:
      - dokploy-network


  adminer:
    image: adminer:latest
    container_name: adminer-web
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: managed-postgres
    depends_on:
      managed-postgres:
        condition: service_healthy
    networks:
      - dokploy-network


volumes:
  pgvector_data:
    driver: local

  redis_data:
    driver: local


networks:
  dokploy-network:
    external: true
