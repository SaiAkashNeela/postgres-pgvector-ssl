version: '3.8'

services:
  managed-postgres:
    build:
      context: .
      dockerfile: postgres/db/Dockerfile
    container_name: managed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  managed-redis:
    image: redis:latest
    container_name: managed-redis
    restart: unless-stopped
    command: redis-server
    volumes:
      - redis_data:/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: adminer-web
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: managed-postgres
    depends_on:
      managed-postgres:
        condition: service_healthy
    networks:
      - dokploy-network

volumes:
  pgvector_data:
    driver: local
  redis_data:
    driver: local

networks:
  dokploy-network:
    external: true
