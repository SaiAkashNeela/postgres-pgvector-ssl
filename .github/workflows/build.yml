name: Build and Push postgres-pgvector-ssl

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 3am UTC
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if Railway image unchanged'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Railway scripts
        run: |
          for f in init-ssl.sh pgbackrest-archive-push-wrapper.sh pgbackrest-backup-watcher.sh pgbackrest-init.sh wrapper.sh; do
            curl -fsSL "https://raw.githubusercontent.com/railwayapp-templates/postgres-ssl/main/${f}" -o "${f}"
            chmod +x "${f}"
          done

      - name: Get Railway source digest
        id: railway
        run: |
          DIGEST=$(curl -s "https://api.github.com/repos/railwayapp-templates/postgres-ssl/commits/main" | jq -r '.sha')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "pg_major=16" >> $GITHUB_OUTPUT
          echo "Railway commit: $DIGEST"

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Check if rebuild needed
        id: check
        run: |
          OWNER=${{ steps.owner.outputs.name }}
          CACHED_DIGEST=""
          if docker pull ghcr.io/${OWNER}/postgres-pgvector-ssl:latest 2>/dev/null; then
            CACHED_DIGEST=$(docker inspect ghcr.io/${OWNER}/postgres-pgvector-ssl:latest --format '{{index .Config.Labels "railway.digest"}}' 2>/dev/null || echo "")
          fi
          echo "cached_digest=$CACHED_DIGEST" >> $GITHUB_OUTPUT
          if [ "$CACHED_DIGEST" = "${{ steps.railway.outputs.digest }}" ] && [ "${{ inputs.force_rebuild }}" != "true" ]; then
            echo "rebuild=false" >> $GITHUB_OUTPUT
            echo "No change in Railway source, skipping build."
          else
            echo "rebuild=true" >> $GITHUB_OUTPUT
            echo "Railway source changed or force rebuild, rebuilding."
          fi

      - name: Set up QEMU
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/postgres-pgvector-ssl:latest
            ghcr.io/${{ steps.owner.outputs.name }}/postgres-pgvector-ssl:${{ steps.railway.outputs.pg_major }}
          labels: |
            railway.digest=${{ steps.railway.outputs.digest }}
